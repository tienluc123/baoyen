<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảo Yến ❤️</title>

<style>

body{

margin:0;

padding:0;

font-family:Arial,sans-serif;

background:linear-gradient(to bottom,#ff9ecf,#ffd6e7);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.container{

text-align:center;

color:white;

}

h1{

font-size:42px;

margin-bottom:20px;

}

button{

padding:15px 35px;

font-size:22px;

border:none;

border-radius:50px;

cursor:pointer;

margin:10px;

transition:0.3s;

}

#yes{

background:#ff3366;

color:white;

}

#no{

background:white;

color:#ff3366;

position:absolute;

}

#message{

display:none;

font-size:38px;

margin-top:30px;

animation:fade 1s;

}

@keyframes fade{

from{opacity:0;}

to{opacity:1;}

}

</style>

</head>

<body>

<div class="container">

<h1>Bảo Yến làm vợ anh nhé ❤️</h1>

<button id="yes" onclick="yes()">Đồng ý 💍</button>

<button id="no" onmouseover="move()">Không 😝</button>

<div id="message">

❤️ Anh yêu em rất nhiều ❤️

<br><br>

💍 24/07/2026 💍

</div>

</div>

<script>

function yes(){

document.getElementById("message").style.display="block";

document.getElementById("yes").style.display="none";

document.getElementById("no").style.display="none";

}

function move(){

let no=document.getElementById("no");

no.style.left=Math.random()*80+"%";

no.style.top=Math.random()*80+"%";

}

</script>

</body>

</html>
